<!DOCTYPE html>
<html>
<head>
<title>Panel TeleFix</title>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
padding:40px;
}

.order{
background:#fff;
color:#000;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

select{
margin-top:10px;
}
</style>

</head>

<body>

<h1>Zamówienia</h1>

<div id="orders"></div>

<script>

async function load(){

const res = await fetch("/orders");
const data = await res.json();

const container = document.getElementById("orders");

container.innerHTML="";

data.forEach(o=>{

const paid = o.payment_status === "Opłacone";

container.innerHTML += `

<div class="order">

<h3>#${o.id}</h3>

<p>
<strong>${o.name}</strong><br>
📧 ${o.email}<br>
📞 ${o.phone}<br>
📍 ${o.address}
</p>

<p>
💰 Kwota: <strong>${o.total} zł</strong><br>
📦 Status: ${o.status}<br>
💳 Płatność: 
<span style="
color:${paid ? 'green' : 'red'};
font-weight:bold;
">
${paid ? "OPŁACONE ✅" : "NIEOPŁACONE ❌"}
</span><br>
🕒 Data: ${o.date}
</p>

<select onchange="changeStatus(${o.id},this.value)">

<option ${o.status==="Nowe"?"selected":""}>Nowe</option>
<option ${o.status==="W realizacji"?"selected":""}>W realizacji</option>
<option ${o.status==="Wysłane"?"selected":""}>Wysłane</option>

</select>

</div>

`;

});

}

async function changeStatus(id,status){

await fetch("/status",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({id,status})
});

// 🔥 odśwież po zmianie
load();

}

load();

</script>

</body>
</html>

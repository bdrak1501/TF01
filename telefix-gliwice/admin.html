<!DOCTYPE html>
<html>
<head>
<title>Panel TeleFix</title>

<style>
body{
font-family:Arial;
background:#111;
color:#fff;
padding:40px;
}

.order{
background:#fff;
color:#000;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

select{
margin-top:10px;
}

.logout{
margin-bottom:20px;
padding:10px 20px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Zamówienia</h1>

<button class="logout" onclick="logout()">Wyloguj</button>

<div id="orders"></div>

<script>

const token = localStorage.getItem("token");

// 🔐 sprawdzanie logowania
if(!token){
    window.location.href = "/login.html";
}

// 🔓 logout
function logout(){
    localStorage.removeItem("token");
    window.location.href="/login.html";
}

console.log("TOKEN:", token);

async function load(){

try{

// ✅ POPRAWNY ENDPOINT
const res = await fetch("/orders", {
    headers: { 
        Authorization: token // ❗ BEZ Bearer
    }
});

// ❗ jeśli brak dostępu → wyloguj
if(res.status === 401){
    alert("Sesja wygasła - zaloguj się ponownie");
    logout();
    return;
}

const data = await res.json();

// ❗ zabezpieczenie
if(!Array.isArray(data)){
    console.error("API ERROR:", data);
    return;
}

const container = document.getElementById("orders");
container.innerHTML="";

// 🔥 najnowsze na górze
data.reverse().forEach(o=>{

const products = (o.products || []).map(p => `
<div style="margin-top:5px;padding:5px;border-bottom:1px solid #ddd;">
📱 ${p.name || "-"} | ${p.memory || "-"} | ${p.condition || "-"}
</div>
`).join("");

container.innerHTML += `
<div class="order">

<h3>#${o.id}</h3>

<p>
<strong>${o.name || "Klient Stripe"}</strong><br>
📧 ${o.email || "-"}<br>
</p>

<p>
💰 <strong>${o.total || 0} zł</strong><br>
📦 Status: ${o.status || "Nowe"}<br>
💳 ${o.payment_status || "Opłacone"}
</p>

<div style="margin-top:10px;">
<strong>Produkty:</strong><br>
${products}
</div>

<select onchange="changeStatus(${o.id},this.value)">
<option ${o.status==="Nowe"?"selected":""}>Nowe</option>
<option ${o.status==="W realizacji"?"selected":""}>W realizacji</option>
<option ${o.status==="Wysłane"?"selected":""}>Wysłane</option>
</select>

</div>
`;

});

}catch(e){
console.error("LOAD ERROR", e);
}

}

// 🔄 zmiana statusu
async function changeStatus(id,status){

await fetch("/status",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization: token // ❗ BEZ Bearer
},
body: JSON.stringify({id,status})
});

load();

}

// 🚀 start
load();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<title>Checkout – TeleFix</title>

<link rel="stylesheet" href="style.css">

<style>

*{
    box-sizing:border-box;
}

    body{
    margin:0;
    font-family: 'Poppins', sans-serif;

    background:#f5f7fb; /* lekko szare tło jak na nowoczesnych stronach */
}

.checkout-wrapper{
    max-width:1100px;
    margin:140px auto 80px;

    padding:0 20px;

    display:grid;
    grid-template-columns:1fr 420px;

    gap:40px;
}

.checkout-form{

background:#fff;
 padding:40px 60px 40px 50px;
border-radius:25px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

}

.checkout-form input{

width:100%;

border-radius:10px;
border:1px solid #ddd;


}

.checkout-summary{

background:#fff;
padding:30px;
border-radius:25px;

box-shadow:0 15px 40px rgba(0,0,0,.08);

}

.order-btn{

width:100%;
background:#111;
color:#fff;

border:none;
padding:16px;

border-radius:30px;

font-size:16px;
cursor:pointer;

margin-top:20px;

}

.cart-product{
    display:flex;
    gap:14px;
    margin-bottom:16px;

    align-items:center;
}

.cart-product div{
    font-size:14px;
}

.cart-product img{
    width:60px;
    height:60px;

    object-fit:cover; /* 🔥 KLUCZ */
    border-radius:10px;
}

.checkout-form,
.checkout-summary{
    background:#fff;
    padding:40px;
    border-radius:25px;

    box-shadow:0 20px 60px rgba(0,0,0,.06);

    transition:.3s;
}

.checkout-form:hover,
.checkout-summary:hover{
    transform:translateY(-3px);
}

.checkout-form input{
    width:100%;
    padding:14px;

    border-radius:12px;
    border:1px solid #e5e7eb;

    margin-bottom:14px;

    transition:.2s;
}

.checkout-form input:focus{
    border-color:#111;
    outline:none;

    box-shadow:0 0 0 2px rgba(0,0,0,.05);
}

</style>

</head>

<body>

<div class="checkout-wrapper">

<div class="checkout-form">

<h2>Dane zamówienia</h2>

<input id="name" placeholder="Imię i nazwisko">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Telefon">
<input id="address" placeholder="Adres dostawy">

</div>

<div class="checkout-summary">

<h3>Twoje zamówienie</h3>

<div id="order-products"></div>

<h3 id="order-total"></h3>

<button class="order-btn" onclick="placeOrder()">
Złóż zamówienie
</button>

</div>

</div>

<script src="checkout.js"></script>

</body>
</html>
